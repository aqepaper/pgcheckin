<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>長期義工 總部義工 搭車登記系統</title>
<meta http-equiv="refresh" content="2;url=https://script.google.com/macros/s/AKfycbwTQodHM1uFomWOFzTNyLNdVD-FAjvpAAzvgOcUnnzUfcOLz1yhDlOg1usdA3F_CM8u/exec">
<style>
  :root{
    --gold:#4f9d69;
    --gold-dark:#2f6b45;
    --bg:#f2faf4;
    --border:#d7ecdc;
    --text:#24352a;
    --muted:#5f7d68;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--bg);
    color:var(--text);
    font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
    -webkit-text-size-adjust:100%;
  }
  .box{
    max-width:420px;
    width:100%;
    margin:20px;
    padding:32px 22px;
    text-align:center;
    background:#ffffff;
    border:1px solid var(--border);
    border-radius:14px;
    box-shadow:0 2px 10px rgba(47,107,69,0.08);
  }
  .spinner{
    width:36px; height:36px;
    margin:0 auto 18px;
    border:3px solid var(--border);
    border-top-color:var(--gold);
    border-radius:50%;
    animation:spin .8s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  h1{
    font-size:20px;
    margin:0 0 8px;
    color:var(--gold-dark);
  }
  p{
    font-size:16px;
    color:var(--muted);
    margin:0 0 20px;
    line-height:1.6;
  }
  a.btn{
    display:inline-block;
    background:var(--gold);
    color:#fff;
    text-decoration:none;
    font-size:16px;
    font-weight:700;
    padding:12px 24px;
    border-radius:10px;
  }
</style>
<script>
  // 停留 2 秒讓文字顯示完整，再用 JS 導向（並取代目前的瀏覽紀錄）
  setTimeout(function(){
    window.location.replace(
      "https://script.google.com/macros/s/AKfycbwTQodHM1uFomWOFzTNyLNdVD-FAjvpAAzvgOcUnnzUfcOLz1yhDlOg1usdA3F_CM8u/exec"
    );
  }, 2000);
</script>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <h1>長期義工 總部義工 搭車登記系統</h1>
    <p>正在為您導向報名頁面，如果畫面沒有自動跳轉，請點選下方按鈕</p>
    <a class="btn" href="https://script.google.com/macros/s/AKfycbwTQodHM1uFomWOFzTNyLNdVD-FAjvpAAzvgOcUnnzUfcOLz1yhDlOg1usdA3F_CM8u/exec">前往報名</a>
  </div>
</body>
</html>
