<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="refresh" content="0; url=https://script.google.com/macros/s/AKfycbwTQodHM1uFomWOFzTNyLNdVD-FAjvpAAzvgOcUnnzUfcOLz1yhDlOg1usdA3F_CM8u/exec">
<title>義工搭車登記 — 轉址中</title>
<style>
  :root{
    --gold:#4f9d69;
    --gold-dark:#2f6b45;
    --bg:#f2faf4;
    --card:#ffffff;
    --border:#d7ecdc;
    --text:#24352a;
    --muted:#5f7d68;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    height:100%;
    background:var(--bg);
    font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
    color:var(--text);
  }
  .wrap{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
  }
  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:14px;
    padding:36px 28px;
    max-width:420px;
    width:100%;
    text-align:center;
    box-shadow:0 2px 10px rgba(47,107,69,0.08);
  }
  .spinner{
    width:40px;height:40px;
    margin:0 auto 20px;
    border:4px solid var(--border);
    border-top-color:var(--gold);
    border-radius:50%;
    animation:spin .8s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  h1{
    font-size:20px;
    margin:0 0 8px;
    color:var(--gold-dark);
  }
  p{
    font-size:16px;
    color:var(--muted);
    margin:0 0 22px;
    line-height:1.6;
  }
  a.btn{
    display:inline-block;
    background:var(--gold);
    color:#fff;
    text-decoration:none;
    font-size:16px;
    font-weight:700;
    padding:12px 24px;
    border-radius:10px;
  }
</style>
<script>
  window.location.replace(
    "https://script.google.com/macros/s/AKfycbwTQodHM1uFomWOFzTNyLNdVD-FAjvpAAzvgOcUnnzUfcOLz1yhDlOg1usdA3F_CM8u/exec"
  );
</script>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="spinner"></div>
      <h1>義工搭車登記</h1>
      <p>正在為您轉往正式報名頁面，<br>若畫面沒有自動跳轉，請點下方按鈕。</p>
      <a class="btn" href="https://script.google.com/macros/s/AKfycbwTQodHM1uFomWOFzTNyLNdVD-FAjvpAAzvgOcUnnzUfcOLz1yhDlOg1usdA3F_CM8u/exec">前往報名</a>
    </div>
  </div>
</body>
</html>
