<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>課務講習資訊看板</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#faf3e7;
    --paper-deep:#f2e6d0;
    --ink:#3a2e22;
    --ink-soft:#6b5a45;
    --accent:#a8452f;
    --accent-soft:#c9714f;
    --gold:#b8863b;
    --line:#d8c6a8;
    --day:#c9714f;
    --night:#3f6b6a;
    --green:#5b7a52;
    --red:#a8452f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:linear-gradient(180deg,#f6ede0,#efe1c8 60%,#efe1c8);
    font-family:"Noto Sans TC","Noto Serif TC",serif;
    color:var(--ink);
    padding:24px 16px 48px;
  }
  .wrap{max-width:680px;margin:0 auto;}
  header{
    text-align:center;
    margin-bottom:22px;
  }
  .kicker{
    font-size:15px;
    letter-spacing:.25em;
    color:var(--ink-soft);
    margin-bottom:6px;
  }
  h1{
    font-family:"Noto Serif TC",serif;
    font-weight:900;
    font-size:30px;
    margin:0 0 4px;
    color:var(--ink);
  }
  .sub{
    font-size:15px;
    color:var(--ink-soft);
  }
  .divider{
    width:64px;height:3px;background:var(--gold);
    margin:14px auto 0;border-radius:2px;
  }

  .stat-row{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
    margin:22px 0;
  }
  .stat-card{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:16px;
    padding:18px 8px;
    text-align:center;
    box-shadow:0 2px 6px rgba(80,60,30,.06);
  }
  .stat-card .num{
    font-family:"Noto Serif TC",serif;
    font-weight:900;
    font-size:34px;
    line-height:1.1;
  }
  .stat-card.total .num{color:var(--gold);}
  .stat-card.attend .num{color:var(--green);}
  .stat-card.leave .num{color:var(--red);}
  .stat-card .label{
    margin-top:6px;
    font-size:15px;
    font-weight:700;
    color:var(--ink-soft);
  }

  .section{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:18px;
    padding:20px 18px 22px;
    margin-bottom:18px;
    box-shadow:0 2px 6px rgba(80,60,30,.06);
  }
  .section h2{
    font-size:19px;
    font-weight:700;
    margin:0 0 14px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .section h2::before{
    content:"";
    width:6px;height:20px;
    background:var(--accent);
    border-radius:3px;
    display:inline-block;
  }

  /* gender section */
  .gender-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
  }
  .gender-card{
    background:var(--paper-deep);
    border-radius:14px;
    padding:16px 10px;
    text-align:center;
  }
  .gender-card .icon{font-size:26px;margin-bottom:4px;}
  .gender-card .num{
    font-family:"Noto Serif TC",serif;
    font-weight:900;
    font-size:30px;
  }
  .gender-card.female .num{color:#a8536b;}
  .gender-card.male .num{color:#3f6b8a;}
  .gender-card .label{font-size:14px;color:var(--ink-soft);margin-top:2px;}
  .gender-note{
    text-align:center;font-size:13px;color:var(--ink-soft);
    margin-top:12px;
  }

  /* bar chart */
  .bar-row{
    display:flex;align-items:center;gap:10px;
    margin-bottom:12px;
  }
  .bar-label{
    width:52px;flex-shrink:0;
    font-size:16px;font-weight:700;text-align:right;
    color:var(--ink);
  }
  .bar-track{
    flex:1;background:var(--paper-deep);
    border-radius:8px;height:26px;position:relative;overflow:hidden;
  }
  .bar-fill{
    height:100%;border-radius:8px 0 0 8px;
    display:flex;align-items:center;justify-content:flex-end;
    padding-right:8px;
    color:#fff;font-size:14px;font-weight:700;
    min-width:34px;
  }
  .bar-fill.day{background:linear-gradient(90deg,var(--day),#d98a63);}
  .bar-fill.night{background:linear-gradient(90deg,var(--night),#5a8f8d);}

  .legend{
    display:flex;gap:18px;justify-content:center;
    margin-top:10px;font-size:13px;color:var(--ink-soft);
  }
  .legend span{display:inline-flex;align-items:center;gap:6px;}
  .dot{width:10px;height:10px;border-radius:3px;display:inline-block;}
  .dot.day{background:var(--day);}
  .dot.night{background:var(--night);}

  footer{
    text-align:center;font-size:12px;color:var(--ink-soft);
    margin-top:8px;
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="kicker">55 期 培 訓 ・ 課 務 篇</div>
    <h1>課務講習資訊看板</h1>
    <div class="sub">報名統計總覽</div>
    <div class="divider"></div>
  </header>

  <div class="stat-row">
    <div class="stat-card total">
      <div class="num">99</div>
      <div class="label">總人數</div>
    </div>
    <div class="stat-card attend">
      <div class="num">88</div>
      <div class="label">參加</div>
    </div>
    <div class="stat-card leave">
      <div class="num">11</div>
      <div class="label">請假</div>
    </div>
  </div>

  <div class="section">
    <h2>參加人數・性別</h2>
    <div class="gender-grid">
      <div class="gender-card female">
        <div class="icon">👩</div>
        <div class="num">73</div>
        <div class="label">女眾</div>
      </div>
      <div class="gender-card male">
        <div class="icon">🧑</div>
        <div class="num">15</div>
        <div class="label">男眾</div>
      </div>
    </div>
    <div class="gender-note">共計參加 88 人（不含 1 筆測試帳號資料）</div>
  </div>

  <div class="section">
    <h2>班別統計（參加人數）</h2>

    <div class="bar-row">
      <div class="bar-label">夜高</div>
      <div class="bar-track"><div class="bar-fill night" style="width:100%">23</div></div>
    </div>
    <div class="bar-row">
      <div class="bar-label">夜研</div>
      <div class="bar-track"><div class="bar-fill night" style="width:91.3%">21</div></div>
    </div>
    <div class="bar-row">
      <div class="bar-label">夜初</div>
      <div class="bar-track"><div class="bar-fill night" style="width:43.5%">10</div></div>
    </div>
    <div class="bar-row">
      <div class="bar-label">日高</div>
      <div class="bar-track"><div class="bar-fill day" style="width:43.5%">10</div></div>
    </div>
    <div class="bar-row">
      <div class="bar-label">日研</div>
      <div class="bar-track"><div class="bar-fill day" style="width:39.1%">9</div></div>
    </div>
    <div class="bar-row">
      <div class="bar-label">夜中</div>
      <div class="bar-track"><div class="bar-fill night" style="width:26.1%">6</div></div>
    </div>
    <div class="bar-row">
      <div class="bar-label">日初</div>
      <div class="bar-track"><div class="bar-fill day" style="width:21.7%">5</div></div>
    </div>
    <div class="bar-row">
      <div class="bar-label">日中</div>
      <div class="bar-track"><div class="bar-fill day" style="width:17.4%">4</div></div>
    </div>

    <div class="legend">
      <span><i class="dot day"></i>日班</span>
      <span><i class="dot night"></i>夜班</span>
    </div>
  </div>

  <footer>資料來源：55期培訓--課務篇 報名表　・　依「狀態(參加/請假)」與「班別」欄位統計</footer>

</div>
</body>
</html>
